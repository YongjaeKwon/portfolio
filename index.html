<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08090d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />

    <!-- Display & mono fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&family=Jua&family=Do+Hyeon&display=swap"
      rel="stylesheet"
    />
    <!-- 메이플 모드 픽셀 폰트 (레벨/스탯 숫자용) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("portfolio-theme");
          const systemTheme = window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
          const theme = savedTheme === "light" || savedTheme === "dark" ? savedTheme : systemTheme;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          const savedSkin = localStorage.getItem("portfolio-skin");
          document.documentElement.dataset.skin = savedSkin === "maple" ? "maple" : "default";
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.dataset.skin = "default";
        }
      })();
    </script>
    <meta
      name="description"
      content="권용재 웹 개발자 포트폴리오. 운영 시스템, 관리자 도구, 웹·모바일 업무 화면, API·SQL·외부 연동 경험을 역할 관점별로 정리했습니다."
    />

    />
