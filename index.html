<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("portfolio-theme");
          const systemTheme = window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
          const theme = savedTheme === "light" || savedTheme === "dark" ? savedTheme : systemTheme;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <meta
      name="description"
      content="권용재 프론트엔드 개발자 포트폴리오. 웹/모바일 업무 화면, Vue.js, React, TypeScript, REST API, WebSocket, 운영 시스템 개발 경험을 정리했습니다."
    />
    <meta property="og:title" content="권용재 | Frontend Portfolio" />
    <meta
      property="og:description"
      content="입력 흐름, API 응답, 권한 조건, 실시간 데이터 상태를 함께 확인하며 운영 환경의 웹 화면을 구현하는 프론트엔드 개발자 포트폴리오입니다."
    />
    <meta property="og:type" content="website" />
    <title>권용재 | Frontend Engineer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
